<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Kitchen Screen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --citron:        #2A2205;
      --citron-dim:    #1a1502;
      --citron-glow:   rgba(0, 0, 0, 0.12);
      --citron-border: rgba(42, 34, 5, 0.2);
      --bg:            #C8A94A;
      --surface:       rgba(0,0,0,0.18);
      --surface-2:     rgba(0,0,0,0.25);
      --text:          #2A2205;
      --text-muted:    rgba(42, 34, 5, 0.55);
      --serif:         'DM Serif Display', Georgia, serif;
      --sans:          'DM Sans', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      overflow: hidden;
      touch-action: manipulation;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0;
      opacity: 0.6;
    }

    #launcher {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 10;
      padding: 32px 28px 28px;
      gap: 0;
    }

    .clock-block {
      text-align: center;
    }

    .clock {
      font-family: var(--serif);
      font-size: clamp(52px, 12vw, 80px);
      color: var(--citron);
      letter-spacing: -1px;
      line-height: 1;
    }

    .date {
      font-size: clamp(13px, 2.5vw, 16px);
      font-weight: 300;
      color: var(--text-muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: 6px;
    }

    .divider {
      width: 48px;
      height: 1px;
      background: var(--citron-border);
      margin: 0 auto 32px;
      animation: fadeUp 0.6s 0.1s ease both;
    }

    .btn-group-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
      text-align: center;
    }

    .group-row {
      width: 100%;
      max-width: 460px;
    }

    /* Calendar — 3 equal columns */
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      animation: fadeUp 0.6s 0.2s ease both;
      opacity: 0;
      animation-fill-mode: forwards;
    }

    /* Quick launch — 2 stacked full-width buttons */
    .action-stack {
      display: flex;
      flex-direction: column;
      gap: 10px;
      animation: fadeUp 0.6s 0.35s ease both;
      opacity: 0;
      animation-fill-mode: forwards;
      margin-top: 10px;
    }

    .btn {
      position: relative;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 18px 20px;
      background: var(--surface);
      border: 1px solid var(--citron-border);
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      user-select: none;
      min-height: 64px;
      overflow: hidden;
      width: 100%;
    }

    /* Calendar buttons keep vertical layout */
    .btn.cal {
      flex-direction: column;
      gap: 8px;
      padding: 20px 12px 18px;
      min-height: 88px;
      border-color: rgba(237, 206, 130, 0.3);
    }

    .btn::before {
      content: '';
      position: absolute; inset: 0;
      background: var(--citron-glow);
      opacity: 0;
      transition: opacity 0.15s;
      border-radius: inherit;
    }

    .btn:active { transform: scale(0.97); }
    .btn:active::before { opacity: 1; }

    .btn-icon { font-size: 26px; line-height: 1; flex-shrink: 0; }

    .btn-label {
      font-size: clamp(11px, 2.2vw, 13px);
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text);
    }

    .btn.cal .btn-label { color: var(--citron); }
    .btn.action .btn-label { color: var(--text-muted); }

    /* iPlayer logo inside button */
    .iplayer-logo {
      height: 28px;
      width: auto;
      object-fit: contain;
      flex-shrink: 0;
    }

    /* ── CALENDAR VIEW ── */
    #cal-view {
      position: fixed; inset: 0;
      background: var(--bg);
      z-index: 20;
      display: none;
      flex-direction: column;
      animation: fadeIn 0.25s ease;
    }

    #cal-view.active { display: flex; }

    .countdown-bar {
      height: 3px;
      background: var(--surface-2);
      flex-shrink: 0;
      overflow: hidden;
    }

    .countdown-fill {
      height: 100%;
      background: var(--citron);
      width: 100%;
      transform-origin: left;
      transition: none;
    }

    .cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px 10px;
      border-bottom: 1px solid var(--citron-border);
      flex-shrink: 0;
    }

    .cal-title {
      font-family: var(--serif);
      font-size: 20px;
      color: var(--citron);
    }

    .cal-back {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 8px 16px;
      border: 1px solid var(--citron-border);
      border-radius: 8px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .cal-back:active { color: var(--citron); border-color: var(--citron); }

    #cal-iframe {
      flex: 1;
      width: 100%;
      border: none;
      display: block;
      background: white;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ── Clock row with Bertie ── */
    .clock-row {
      display: flex;
      flex-direction: row;
      align-items: flex-end;
      justify-content: center;
      gap: 20px;
      margin-bottom: 36px;
      animation: fadeUp 0.6s ease both;
    }

    .bertie {
      width: auto;
      height: 160px;
      object-fit: contain;
      flex-shrink: 0;
    }

    .clock-block {
      text-align: center;
    }

  </style>
</head>

        </button>
        <button class="btn cal" onclick="openCalView('Month', 'MONTH')">
          <span class="btn-icon">📅</span>
          <span class="btn-label">Month</span>
        </button>
      </div>
    </div>

    <div class="group-row">
      <div class="btn-group-label" style="margin-top:18px;">Quick Launch</div>
      <div class="action-stack">
        <button class="btn action" onclick="openURL('https://www.bbc.co.uk/food')">
          <span class="btn-icon">🍳</span>
          <span class="btn-label">Recipes</span>
        </button>
        <button class="btn action" onclick="openURL('bbciplayer://')">
          <img class="iplayer-logo"
               src="https://static.files.bbci.co.uk/core/website/assets/static/iplayer/4.6.2/img/iPlayerLogo.png"
               onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';"
               alt="BBC iPlayer">
          <span class="btn-label" style="display:none;">iPlayer</span>
        </button>
      </div>
    </div>
  </div>

  <!-- ── CALENDAR VIEW ── -->
  <div id="cal-view">
    <div class="countdown-bar">
      <div class="countdown-fill" id="countdown-fill"></div>
    </div>
    <div class="cal-header">
      <div class="cal-title" id="cal-title">Day View</div>
      <div class="cal-back" onclick="closeCalView()">← Back</div>
    </div>
    <iframe id="cal-iframe" src="" allowfullscreen></iframe>
  </div>

  <script>
    const CALENDAR_SRC = encodeURIComponent('p38ssn8v0juf6ilbq7cp6k264g@group.calendar.google.com');

    // ── Clock ──
    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('clock').textContent = `${h}:${m}`;

      const days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      const months = ['January','February','March','April','May','June',
                      'July','August','September','October','November','December'];
      const d = now.getDate();
      const suffix = d === 1 || d === 21 || d === 31 ? 'st'
                   : d === 2 || d === 22 ? 'nd'
                   : d === 3 || d === 23 ? 'rd' : 'th';
      document.getElementById('date-display').textContent =
        `${days[now.getDay()]}  ·  ${d}${suffix} ${months[now.getMonth()]}`;
    }

    updateClock();
    setInterval(updateClock, 10000);

    // ── Calendar view ──
    const CAL_DURATION = 60000;
    let calTimer = null;

    function openCalView(label, mode) {
      const view   = document.getElementById('cal-view');
      const title  = document.getElementById('cal-title');
      const fill   = document.getElementById('countdown-fill');
      const iframe = document.getElementById('cal-iframe');

      title.textContent = label + ' View';
      iframe.src = `https://calendar.google.com/calendar/embed?src=${CALENDAR_SRC}&mode=${mode}&showTitle=0&showNav=1&showDate=1&showPrint=0&showTabs=0&showCalendars=0&showTz=0&hl=en_GB`;
      view.classList.add('active');

      fill.style.transition = 'none';
      fill.style.transform  = 'scaleX(1)';
      fill.getBoundingClientRect();
      fill.style.transition = `transform ${CAL_DURATION}ms linear`;
      fill.style.transform  = 'scaleX(0)';

      clearTimeout(calTimer);
      calTimer = setTimeout(closeCalView, CAL_DURATION);
    }

    function closeCalView() {
      clearTimeout(calTimer);
      document.getElementById('cal-view').classList.remove('active');
      document.getElementById('cal-iframe').src = '';
    }

    function openURL(url) {
      window.location.href = url;
    }
  </script>

</body>
</html>
